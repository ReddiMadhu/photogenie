# =============================================================================
# Enterprise Face Search Platform — Docker Compose (Lean v1)
# §5.2 / §5.9: api, workers, ml-inference, identity, retrieval,
#               postgres, qdrant, redis, minio, web
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Data Stores
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photogenic}
      POSTGRES_USER: ${POSTGRES_USER:-photogenic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg_password}
    # Internal only — do not publish DB to host in production-like setups
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../services/api/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ../services/api/migrations/002_nullable_face_asset.sql:/docker-entrypoint-initdb.d/002_nullable_face_asset.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photogenic}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.1
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # Console only on host; S3 API stays internal
    ports:
      - "9001:9001"
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro

  workers:
    build:
      context: ..
      dockerfile: services/workers/Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      ml-inference:
        condition: service_started
      identity:
        condition: service_started
    volumes:
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro

  beat:
    build:
      context: ..
      dockerfile: services/workers/Dockerfile
    command: ["celery", "-A", "services.workers.celery_app", "beat", "--loglevel=info"]
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
      workers:
        condition: service_started
    volumes:
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro

  ml-inference:
    build:
      context: ..
      dockerfile: services/ml_inference/Dockerfile
    # Internal Docker network only — reach via api/workers
    expose:
      - "8001"
    env_file: ../.env
    volumes:
      - model_cache:/root/.insightface
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  identity:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    expose:
      - "8002"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro

  retrieval:
    build:
      context: ..
      dockerfile: services/retrieval/Dockerfile
    expose:
      - "8003"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      ml-inference:
        condition: service_started
    volumes:
      - ../services:/app/services:ro
      - ../packages:/app/packages:ro

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pg_data:
  redis_data:
  qdrant_data:
  minio_data:
  model_cache:
